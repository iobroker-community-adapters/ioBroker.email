# Dependabot will run on day 12 of each month at 01:37 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '31 2 28 * *'
    open-pull-requests-limit: 15
    versioning-strategy: 'increase'

  - package-ecosystem: 'npm'
    directory: '/src-admin'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '31 2 28 * *'
    open-pull-requests-limit: 15
    versioning-strategy: 'increase'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '31 2 28 * *'
    open-pull-requests-limit: 15
